<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
        background: #f4f5f7;
      }
      main {
        width: min(600px, 90vw);
        margin: 40px 0;
        padding: 24px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.06);
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.8rem;
      }
      form {
        display: grid;
        gap: 12px;
        margin-bottom: 24px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 1rem;
      }
      textarea {
        resize: vertical;
      }
      button {
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }
      .task {
        border: 1px solid #e5e7eb;
        padding: 14px;
        border-radius: 10px;
        margin-bottom: 12px;
        display: grid;
        gap: 10px;
      }
      .task.priority-low {
        border-left: 4px solid #10b981;
        background: linear-gradient(to right, rgba(16, 185, 129, 0.05), transparent);
      }
      .task.priority-medium {
        border-left: 4px solid #f59e0b;
        background: linear-gradient(to right, rgba(245, 158, 11, 0.05), transparent);
      }
      .task.priority-high {
        border-left: 4px solid #ef4444;
        background: linear-gradient(to right, rgba(239, 68, 68, 0.05), transparent);
      }
      .task__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .task__header h3 {
        margin: 0;
        font-size: 1.1rem;
      }
      .task__actions button {
        margin-left: 8px;
        background: transparent;
        border: 1px solid #9ca3af;
        color: #111827;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .task__actions button.delete {
        border-color: #ef4444;
        color: #ef4444;
      }
      .task__actions button.complete {
        border-color: #10b981;
        color: #10b981;
      }
      .error {
        color: #b91c1c;
        margin: 0 0 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Task Manager</h1>
      <p>Use this interface to create, update, and delete tasks.</p>

      <section>
        <form id="taskForm">
          <input id="title" placeholder="Task title" required />
          <textarea id="description" placeholder="Optional description" rows="3"></textarea>
          <div style="display:flex; gap: 12px; align-items:center;">
            <label><input id="completed" type="checkbox" /> Completed</label>
            <select id="priority" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db;">
              <option value="low">Low Priority</option>
              <option value="medium" selected>Medium Priority</option>
              <option value="high">High Priority</option>
            </select>
            <button type="submit">Add task</button>
          </div>
        </form>
        <p class="error" id="error" hidden></p>
      </section>

      <section id="taskList"></section>

      <p style="font-size: 0.85rem; color: #6b7280;">Tip: open devtools network tab to see API calls.</p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
