<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Task Manager</h1>
      <p>Use this interface to create, update, and delete tasks.</p>

      <section>
        <form id="taskForm">
          <input id="title" placeholder="Task title" required />
          <textarea id="description" placeholder="Optional description" rows="3"></textarea>
          <div style="display:flex; gap: 12px; align-items:center;">
            <label><input id="completed" type="checkbox" /> Completed</label>
            <select id="priority" style="padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db;">
              <option value="low">Low Priority</option>
              <option value="medium" selected>Medium Priority</option>
              <option value="high">High Priority</option>
            </select>
            <button type="submit">Add task</button>
          </div>
        </form>
        <p class="error" id="error" hidden></p>
      </section>

      <section id="taskList"></section>

      <p style="font-size: 0.85rem; color: #6b7280;">Tip: open devtools network tab to see API calls.</p>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
